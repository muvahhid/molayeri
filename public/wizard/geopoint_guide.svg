<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="520" fill="url(#g)"/>

  <g filter="url(#sh)">
    <rect x="60" y="60" width="700" height="400" rx="26" fill="#0f172a" stroke="#ffffff" stroke-opacity="0.10"/>
    <rect x="90" y="95" width="640" height="60" rx="18" fill="#111827" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="120" y="133" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto" font-size="20" fill="#e5e7eb">
      1) Haritada işletmenin önünden geçen ana yola sağ tıkla
    </text>

    <rect x="90" y="175" width="640" height="260" rx="22" fill="#0b1220" stroke="#ffffff" stroke-opacity="0.10"/>
    <g>
      <rect x="120" y="205" width="370" height="44" rx="14" fill="#111827" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="145" y="235" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18" fill="#e5e7eb">
        40.123456, 29.123456
      </text>

      <rect x="120" y="265" width="520" height="44" rx="14" fill="#0f172a" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="145" y="295" font-family="Inter, system-ui" font-size="18" fill="#cbd5e1">
        En üstte çıkan koordinatları kopyala
      </text>

      <rect x="120" y="325" width="520" height="44" rx="14" fill="#0f172a" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="145" y="355" font-family="Inter, system-ui" font-size="18" fill="#cbd5e1">
        Lat → ilk sayı, Lng → ikinci sayı
      </text>

      <rect x="120" y="385" width="520" height="44" rx="14" fill="#0f172a" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="145" y="415" font-family="Inter, system-ui" font-size="18" fill="#cbd5e1">
        Step 2'de iki kutuya yapıştır, bitti ✅
      </text>
    </g>
  </g>

  <g filter="url(#sh)">
    <rect x="800" y="60" width="340" height="400" rx="26" fill="#0f172a" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="835" y="120" font-family="Inter, system-ui" font-size="22" fill="#e5e7eb" font-weight="700">
      Örnek
    </text>

    <text x="835" y="175" font-family="Inter, system-ui" font-size="16" fill="#94a3b8">
      Harita sağ tık:
    </text>

    <rect x="835" y="195" width="270" height="56" rx="16" fill="#111827" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="855" y="230" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" fill="#e5e7eb">
      40.123456, 29.123456
    </text>

    <text x="835" y="300" font-family="Inter, system-ui" font-size="16" fill="#94a3b8">
      Step 2 inputları:
    </text>

    <rect x="835" y="325" width="270" height="48" rx="14" fill="#0b1220" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="855" y="355" font-family="Inter, system-ui" font-size="16" fill="#e5e7eb">
      Lat: 40.123456
    </text>

    <rect x="835" y="385" width="270" height="48" rx="14" fill="#0b1220" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="855" y="415" font-family="Inter, system-ui" font-size="16" fill="#e5e7eb">
      Lng: 29.123456
    </text>
  </g>
</svg>
